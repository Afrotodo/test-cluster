<!--
  Shopping template — plain HTML + JS, portable.
  Talks to the Django endpoint: searchengine:shopping_search
  If you're not on Django, just change SEARCH_URL below to your JSON endpoint.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shop</title>
<style>
  :root {
    --bg: #faf8f5;
    --card: #ffffff;
    --ink: #1a1a1a;
    --muted: #6b6b6b;
    --line: #e6e2dc;
    --accent: #7a3b2e;       /* warm brick */
    --accent-soft: #f3e9e5;
    --chip: #f0ece6;
    --radius: 14px;
    --shadow: 0 1px 2px rgba(0,0,0,.04), 0 8px 24px rgba(0,0,0,.04);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font: 15px/1.5 ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  }
  .wrap { max-width: 1200px; margin: 0 auto; padding: 24px 20px 64px; }

  /* ---- search bar ---- */
  .searchbar {
    display: flex; gap: 10px; align-items: center;
    background: var(--card); border: 1px solid var(--line);
    border-radius: 999px; padding: 8px 8px 8px 18px;
    box-shadow: var(--shadow); max-width: 720px; margin: 0 auto 28px;
  }
  .searchbar svg { flex: none; color: var(--muted); }
  .searchbar input {
    border: 0; outline: 0; background: transparent; flex: 1;
    font-size: 16px; color: var(--ink);
  }
  .searchbar button {
    border: 0; background: var(--accent); color: #fff;
    padding: 10px 22px; border-radius: 999px; font-size: 15px;
    font-weight: 600; cursor: pointer;
  }
  .searchbar button:hover { opacity: .92; }

  /* ---- layout ---- */
  .layout { display: grid; grid-template-columns: 248px 1fr; gap: 28px; }
  @media (max-width: 820px) { .layout { grid-template-columns: 1fr; } }

  /* ---- filters ---- */
  .filters { align-self: start; position: sticky; top: 20px; }
  .filter-group { border-bottom: 1px solid var(--line); padding: 14px 0; }
  .filter-group:first-child { padding-top: 0; }
  .filter-group h4 {
    margin: 0 0 10px; font-size: 12px; letter-spacing: .06em;
    text-transform: uppercase; color: var(--muted);
  }
  .opt {
    display: flex; align-items: center; gap: 8px;
    font-size: 14px; padding: 3px 0; cursor: pointer;
  }
  .opt input { accent-color: var(--accent); }
  .opt .count { margin-left: auto; color: var(--muted); font-size: 12px; }
  .price-row { display: flex; gap: 8px; align-items: center; }
  .price-row input {
    width: 100%; padding: 8px; border: 1px solid var(--line);
    border-radius: 8px; font-size: 14px;
  }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    border: 1px solid var(--line); background: var(--chip);
    border-radius: 999px; padding: 5px 12px; font-size: 13px; cursor: pointer;
  }
  .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .clear-btn {
    margin-top: 14px; width: 100%; padding: 9px; border: 1px solid var(--line);
    background: var(--card); border-radius: 10px; cursor: pointer; font-size: 14px;
  }

  /* ---- results header ---- */
  .results-top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px; gap: 12px; flex-wrap: wrap;
  }
  .results-top .count-label { color: var(--muted); font-size: 14px; }
  .results-top select {
    padding: 8px 12px; border: 1px solid var(--line);
    border-radius: 10px; background: var(--card); font-size: 14px;
  }

  /* ---- product grid ---- */
  .grid {
    display: grid; gap: 18px;
    grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
  }
  .card {
    background: var(--card); border: 1px solid var(--line);
    border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow);
    display: flex; flex-direction: column; text-decoration: none; color: inherit;
    transition: transform .12s ease, box-shadow .12s ease;
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,0,0,.08); }
  .card .thumb {
    aspect-ratio: 1/1; background: var(--accent-soft) center/cover no-repeat;
    display: flex; align-items: center; justify-content: center; color: var(--muted);
  }
  .card .body { padding: 12px 13px 14px; display: flex; flex-direction: column; gap: 5px; }
  .card .brand { font-size: 12px; color: var(--muted); }
  .card .name {
    font-size: 14px; font-weight: 600; line-height: 1.35;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .card .price { font-size: 16px; font-weight: 700; margin-top: 2px; }
  .card .meta { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); }
  .badges { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
  .badge {
    font-size: 11px; padding: 2px 7px; border-radius: 999px;
    background: var(--accent-soft); color: var(--accent); font-weight: 600;
  }
  .stars { color: #c9892f; }

  .state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .pager { display: flex; justify-content: center; gap: 10px; margin-top: 30px; }
  .pager button {
    padding: 9px 18px; border: 1px solid var(--line); background: var(--card);
    border-radius: 10px; cursor: pointer; font-size: 14px;
  }
  .pager button:disabled { opacity: .4; cursor: default; }
</style>
</head>
<body>
<div class="wrap">

  <!-- ============ SEARCH BAR ============ -->
  <div class="searchbar">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
    </svg>
    <input id="q" type="text" placeholder="Search products, brands, materials…"
           autocomplete="off">
    <button id="searchBtn">Search</button>
  </div>

  <div class="layout">

    <!-- ============ FILTERS ============ -->
    <aside class="filters">
      <div class="filter-group">
        <h4>Category</h4>
        <div id="f-category"></div>
      </div>

      <div class="filter-group">
        <h4>Price</h4>
        <div class="price-row">
          <input id="minPrice" type="number" min="0" placeholder="Min">
          <span>–</span>
          <input id="maxPrice" type="number" min="0" placeholder="Max">
        </div>
      </div>

      <div class="filter-group">
        <h4>Rating</h4>
        <div class="chips" id="f-rating">
          <span class="chip" data-rating="4">4★ & up</span>
          <span class="chip" data-rating="3">3★ & up</span>
        </div>
      </div>

      <div class="filter-group">
        <h4>Brand</h4>
        <div id="f-brand"></div>
      </div>

      <div class="filter-group">
        <h4>Color</h4>
        <div class="chips" id="f-color"></div>
      </div>

      <div class="filter-group">
        <h4>Size</h4>
        <div class="chips" id="f-size"></div>
      </div>

      <div class="filter-group">
        <h4>Ownership</h4>
        <label class="opt"><input type="checkbox" data-flag="black_owned"> Black-owned</label>
        <label class="opt"><input type="checkbox" data-flag="women_owned"> Women-owned</label>
        <label class="opt"><input type="checkbox" data-flag="veteran_owned"> Veteran-owned</label>
        <label class="opt"><input type="checkbox" data-flag="minority_owned"> Minority-owned</label>
      </div>

      <div class="filter-group">
        <label class="opt"><input type="checkbox" id="availOnly"> In stock only</label>
      </div>

      <button class="clear-btn" id="clearBtn">Clear all filters</button>
    </aside>

    <!-- ============ RESULTS ============ -->
    <main>
      <div class="results-top">
        <span class="count-label" id="countLabel">—</span>
        <select id="sort">
          <option value="relevance">Most relevant</option>
          <option value="rating">Top rated</option>
          <option value="price_asc">Price: low to high</option>
          <option value="price_desc">Price: high to low</option>
        </select>
      </div>

      <div class="grid" id="grid"></div>
      <div class="state" id="state" style="display:none;"></div>

      <div class="pager">
        <button id="prevBtn" disabled>← Prev</button>
        <button id="nextBtn" disabled>Next →</button>
      </div>
    </main>
  </div>
</div>

<script>
// ============ CONFIG ============
// Django: use the named URL. Otherwise hard-code your JSON endpoint.
const SEARCH_URL = "{% url 'searchengine:shopping_search' %}";

// ============ STATE ============
const state = {
  q: "", page: 1, sort: "relevance",
  category: "", brand: "", color: "", size: "",
  min_price: "", max_price: "", min_rating: "",
  flags: { black_owned:false, women_owned:false, veteran_owned:false, minority_owned:false },
  available: false,
};
let facetsRendered = false;

// ============ HELPERS ============
const $ = (s) => document.querySelector(s);
const esc = (s) => String(s ?? "").replace(/[&<>"]/g, c =>
  ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c]));

function stars(r) {
  if (!r) return "";
  const full = Math.round(r);
  return `<span class="stars">${"★".repeat(full)}${"☆".repeat(5-full)}</span>`;
}
function money(p, cur) {
  if (p == null) return "";
  const sym = { USD:"$", GBP:"£", EUR:"€" }[cur] || "$";
  return sym + Number(p).toFixed(2);
}

function buildParams() {
  const p = new URLSearchParams();
  if (state.q) p.set("q", state.q);
  p.set("page", state.page);
  p.set("sort", state.sort);
  for (const k of ["category","brand","color","size","min_price","max_price","min_rating"]) {
    if (state[k]) p.set(k, state[k]);
  }
  for (const f in state.flags) if (state.flags[f]) p.set(f, "true");
  if (state.available) p.set("available", "true");
  return p;
}

// ============ FETCH + RENDER ============
async function run() {
  const grid = $("#grid"), st = $("#state");
  st.style.display = "block"; st.textContent = "Loading…"; grid.innerHTML = "";
  try {
    const res = await fetch(`${SEARCH_URL}?${buildParams()}`);
    const data = await res.json();
    if (data.error) { st.textContent = "Search error: " + data.error; return; }

    $("#countLabel").textContent =
      data.found ? `${data.found.toLocaleString()} result${data.found===1?"":"s"}` : "";

    if (!data.hits.length) { st.textContent = "No products match your filters."; return; }
    st.style.display = "none";

    grid.innerHTML = data.hits.map(renderCard).join("");

    // facets: render once (categories/brands/colors/sizes) from first response
    if (!facetsRendered && data.facets) { renderFacets(data.facets); facetsRendered = true; }

    // pager
    const per = 24;
    $("#prevBtn").disabled = state.page <= 1;
    $("#nextBtn").disabled = state.page * per >= data.found;
  } catch (e) {
    st.style.display = "block"; st.textContent = "Could not reach search service.";
  }
}

function renderCard(d) {
  const img = (d.image_url && d.image_url[0]) || "";
  const url = d.product_url || d.document_url || "#";
  const badges = [];
  if (d.black_owned)   badges.push("Black-owned");
  if (d.women_owned)   badges.push("Women-owned");
  if (d.veteran_owned) badges.push("Veteran-owned");
  return `
    <a class="card" href="${esc(url)}" target="_blank" rel="noopener">
      <div class="thumb" ${img ? `style="background-image:url('${esc(img)}')"` : ""}>
        ${img ? "" : "No image"}
      </div>
      <div class="body">
        ${d.product_brand ? `<div class="brand">${esc(d.product_brand)}</div>` : ""}
        <div class="name">${esc(d.product_name || "Untitled")}</div>
        <div class="price">${money(d.product_price, d.product_currency)}</div>
        <div class="meta">
          ${stars(d.product_rating)}
          ${d.product_review_count ? `<span>(${d.product_review_count})</span>` : ""}
        </div>
        ${badges.length ? `<div class="badges">${badges.map(b=>`<span class="badge">${b}</span>`).join("")}</div>` : ""}
      </div>
    </a>`;
}

function renderFacets(facets) {
  // Category — radio-style list
  fillList("#f-category", facets.product_category, "category");
  fillList("#f-brand", facets.product_brand, "brand", 8);
  fillChips("#f-color", facets.product_colors, "color");
  fillChips("#f-size", facets.product_sizes, "size");
}

function fillList(sel, items, key, limit = 12) {
  if (!items) return;
  const el = $(sel);
  el.innerHTML = items.slice(0, limit).map(i => `
    <label class="opt">
      <input type="radio" name="${key}" value="${esc(i.value)}">
      ${esc(i.value)} <span class="count">${i.count}</span>
    </label>`).join("");
  el.querySelectorAll("input").forEach(inp =>
    inp.addEventListener("change", () => { state[key] = inp.value; state.page = 1; run(); }));
}

function fillChips(sel, items, key) {
  if (!items) return;
  const el = $(sel);
  el.innerHTML = items.slice(0, 14).map(i =>
    `<span class="chip" data-val="${esc(i.value)}">${esc(i.value)}</span>`).join("");
  el.querySelectorAll(".chip").forEach(chip =>
    chip.addEventListener("click", () => {
      const v = chip.dataset.val;
      const active = state[key] === v;
      el.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
      state[key] = active ? "" : v;
      if (!active) chip.classList.add("active");
      state.page = 1; run();
    }));
}

// ============ EVENTS ============
$("#searchBtn").addEventListener("click", () => { state.q = $("#q").value.trim(); state.page = 1; run(); });
$("#q").addEventListener("keydown", e => { if (e.key === "Enter") $("#searchBtn").click(); });
$("#sort").addEventListener("change", e => { state.sort = e.target.value; state.page = 1; run(); });

$("#minPrice").addEventListener("change", e => { state.min_price = e.target.value; state.page = 1; run(); });
$("#maxPrice").addEventListener("change", e => { state.max_price = e.target.value; state.page = 1; run(); });

$("#f-rating").querySelectorAll(".chip").forEach(chip =>
  chip.addEventListener("click", () => {
    const r = chip.dataset.rating;
    const active = state.min_rating === r;
    $("#f-rating").querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
    state.min_rating = active ? "" : r;
    if (!active) chip.classList.add("active");
    state.page = 1; run();
  }));

document.querySelectorAll("[data-flag]").forEach(cb =>
  cb.addEventListener("change", () => { state.flags[cb.dataset.flag] = cb.checked; state.page = 1; run(); }));

$("#availOnly").addEventListener("change", e => { state.available = e.target.checked; state.page = 1; run(); });

$("#prevBtn").addEventListener("click", () => { if (state.page > 1) { state.page--; run(); window.scrollTo(0,0); } });
$("#nextBtn").addEventListener("click", () => { state.page++; run(); window.scrollTo(0,0); });

$("#clearBtn").addEventListener("click", () => {
  Object.assign(state, {
    q:"", page:1, sort:"relevance", category:"", brand:"", color:"", size:"",
    min_price:"", max_price:"", min_rating:"",
    flags:{ black_owned:false, women_owned:false, veteran_owned:false, minority_owned:false },
    available:false,
  });
  $("#q").value = ""; $("#minPrice").value = ""; $("#maxPrice").value = "";
  document.querySelectorAll("input[type=checkbox]").forEach(c => c.checked = false);
  document.querySelectorAll("input[type=radio]").forEach(c => c.checked = false);
  document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
  run();
});

// ============ INIT ============
run();  // initial browse (q='*' handled server-side)
</script>
</body>
</html>
