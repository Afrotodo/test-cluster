<!--
  Travel template — destinations, events, packages, rentals, groups, blogs, videos.
  Talks to Django endpoint: searchengine:travel_search
  A content-type tab switches what kind of document is shown.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Travel</title>
<style>
  :root {
    --bg: #f4f7f6;
    --card: #ffffff;
    --ink: #16201d;
    --muted: #647069;
    --line: #dde6e2;
    --accent: #1f6f5c;        /* deep teal-green */
    --accent-soft: #e3f0eb;
    --chip: #e8efec;
    --star: #c9892f;
    --radius: 14px;
    --shadow: 0 1px 2px rgba(0,0,0,.04), 0 8px 24px rgba(0,0,0,.05);
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink);
    font:15px/1.5 ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
  .wrap { max-width:1200px; margin:0 auto; padding:24px 20px 64px; }

  .searchbar { display:flex; gap:10px; align-items:center; background:var(--card);
    border:1px solid var(--line); border-radius:999px; padding:8px 8px 8px 18px;
    box-shadow:var(--shadow); max-width:720px; margin:0 auto 18px; }
  .searchbar svg { flex:none; color:var(--muted); }
  .searchbar input { border:0; outline:0; background:transparent; flex:1; font-size:16px; color:var(--ink); }
  .searchbar button { border:0; background:var(--accent); color:#fff; padding:10px 22px;
    border-radius:999px; font-size:15px; font-weight:600; cursor:pointer; }
  .searchbar button:hover { opacity:.92; }

  /* content-type tabs */
  .tabs { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin:0 auto 26px; max-width:820px; }
  .tab { border:1px solid var(--line); background:var(--card); border-radius:999px;
    padding:8px 16px; font-size:14px; cursor:pointer; color:var(--ink); }
  .tab.active { background:var(--accent); color:#fff; border-color:var(--accent); }

  .layout { display:grid; grid-template-columns:248px 1fr; gap:28px; }
  @media (max-width:820px){ .layout{ grid-template-columns:1fr; } }

  .filters { align-self:start; position:sticky; top:20px; }
  .filter-group { border-bottom:1px solid var(--line); padding:14px 0; }
  .filter-group:first-child { padding-top:0; }
  .filter-group h4 { margin:0 0 10px; font-size:12px; letter-spacing:.06em;
    text-transform:uppercase; color:var(--muted); }
  .opt { display:flex; align-items:center; gap:8px; font-size:14px; padding:3px 0; cursor:pointer; }
  .opt input { accent-color:var(--accent); }
  .opt .count { margin-left:auto; color:var(--muted); font-size:12px; }
  .field { width:100%; padding:9px 12px; border:1px solid var(--line); border-radius:10px; font-size:14px; background:var(--card); }
  .field + .field { margin-top:8px; }
  .chips { display:flex; flex-wrap:wrap; gap:6px; }
  .chip { border:1px solid var(--line); background:var(--chip); border-radius:999px;
    padding:5px 12px; font-size:13px; cursor:pointer; }
  .chip.active { background:var(--accent); color:#fff; border-color:var(--accent); }
  .clear-btn { margin-top:14px; width:100%; padding:9px; border:1px solid var(--line);
    background:var(--card); border-radius:10px; cursor:pointer; font-size:14px; }

  .results-top { display:flex; align-items:center; justify-content:space-between;
    margin-bottom:16px; gap:12px; flex-wrap:wrap; }
  .results-top .count-label { color:var(--muted); font-size:14px; }
  .results-top select { padding:8px 12px; border:1px solid var(--line);
    border-radius:10px; background:var(--card); font-size:14px; }

  .grid { display:grid; gap:18px; grid-template-columns:repeat(auto-fill, minmax(250px,1fr)); }
  .card { background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    overflow:hidden; box-shadow:var(--shadow); display:flex; flex-direction:column;
    text-decoration:none; color:inherit; transition:transform .12s ease, box-shadow .12s ease; }
  .card:hover { transform:translateY(-2px); box-shadow:0 10px 30px rgba(0,0,0,.08); }
  .card .thumb { aspect-ratio:16/10; background:var(--accent-soft) center/cover no-repeat;
    display:flex; align-items:center; justify-content:center; color:var(--muted); position:relative; }
  .card .kind { position:absolute; top:10px; left:10px; background:rgba(0,0,0,.6); color:#fff;
    font-size:11px; padding:3px 9px; border-radius:999px; text-transform:capitalize; }
  .card .body { padding:13px 14px 15px; display:flex; flex-direction:column; gap:6px; }
  .card .name { font-size:15px; font-weight:700; line-height:1.3;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .card .loc { font-size:13px; color:var(--muted); }
  .card .summary { font-size:13px; color:var(--muted);
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .card .meta { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--muted); flex-wrap:wrap; }
  .price-pill { font-weight:700; color:var(--accent); }
  .free-pill { background:var(--accent-soft); color:var(--accent); font-weight:700; font-size:11px; padding:2px 8px; border-radius:999px; }

  .state { text-align:center; padding:60px 20px; color:var(--muted); }
  .pager { display:flex; justify-content:center; gap:10px; margin-top:30px; }
  .pager button { padding:9px 18px; border:1px solid var(--line); background:var(--card);
    border-radius:10px; cursor:pointer; font-size:14px; }
  .pager button:disabled { opacity:.4; cursor:default; }
</style>
</head>
<body>
<div class="wrap">

  <!-- SEARCH BAR -->
  <div class="searchbar">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
    </svg>
    <input id="q" type="text" placeholder="Search destinations, events, stays, groups…" autocomplete="off">
    <button id="searchBtn">Search</button>
  </div>

  <!-- CONTENT-TYPE TABS -->
  <div class="tabs" id="tabs">
    <span class="tab active" data-ct="">All</span>
    <span class="tab" data-ct="destination">Destinations</span>
    <span class="tab" data-ct="event">Events</span>
    <span class="tab" data-ct="package">Packages</span>
    <span class="tab" data-ct="rental">Stays</span>
    <span class="tab" data-ct="group">Groups</span>
    <span class="tab" data-ct="blog">Blogs</span>
    <span class="tab" data-ct="video">Videos</span>
  </div>

  <div class="layout">

    <!-- FILTERS -->
    <aside class="filters">
      <div class="filter-group">
        <h4>Location</h4>
        <input class="field" id="country" type="text" placeholder="Country">
        <input class="field" id="region" type="text" placeholder="Region">
        <input class="field" id="city" type="text" placeholder="City">
      </div>

      <div class="filter-group">
        <h4>Country</h4>
        <div id="f-country"></div>
      </div>

      <div class="filter-group">
        <h4>Event type</h4>
        <div class="chips" id="f-eventtype"></div>
      </div>

      <div class="filter-group">
        <h4>Topics</h4>
        <div class="chips" id="f-topics"></div>
      </div>

      <div class="filter-group">
        <h4>Options</h4>
        <label class="opt"><input type="checkbox" id="freeOnly"> Free events only</label>
      </div>

      <div class="filter-group">
        <h4>Ownership</h4>
        <label class="opt"><input type="checkbox" data-flag="black_owned"> Black-owned</label>
        <label class="opt"><input type="checkbox" data-flag="women_owned"> Women-owned</label>
        <label class="opt"><input type="checkbox" data-flag="veteran_owned"> Veteran-owned</label>
      </div>

      <button class="clear-btn" id="clearBtn">Clear all filters</button>
    </aside>

    <!-- RESULTS -->
    <main>
      <div class="results-top">
        <span class="count-label" id="countLabel">—</span>
        <select id="sort">
          <option value="relevance">Most relevant</option>
          <option value="date">Soonest events</option>
          <option value="newest">Newest</option>
        </select>
      </div>
      <div class="grid" id="grid"></div>
      <div class="state" id="state" style="display:none;"></div>
      <div class="pager">
        <button id="prevBtn" disabled>← Prev</button>
        <button id="nextBtn" disabled>Next →</button>
      </div>
    </main>
  </div>
</div>

<script>
const SEARCH_URL = "{% url 'searchengine:travel_search' %}";

const state = {
  q:"", page:1, sort:"relevance", content_type:"",
  country:"", region:"", city:"", event_type:"", topic:"",
  free:false,
  flags:{ black_owned:false, women_owned:false, veteran_owned:false },
};
let facetsRendered = false;

const $ = s => document.querySelector(s);
const esc = s => String(s ?? "").replace(/[&<>"]/g, c=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c]));

function buildParams(){
  const p = new URLSearchParams();
  if (state.q) p.set("q", state.q);
  p.set("page", state.page); p.set("sort", state.sort);
  if (state.content_type) p.set("content_type", state.content_type);
  for (const k of ["country","region","city","event_type","topic"]) if (state[k]) p.set(k, state[k]);
  if (state.free) p.set("free","true");
  for (const f in state.flags) if (state.flags[f]) p.set(f,"true");
  return p;
}

async function run(){
  const grid=$("#grid"), st=$("#state");
  st.style.display="block"; st.textContent="Loading…"; grid.innerHTML="";
  try {
    const res = await fetch(`${SEARCH_URL}?${buildParams()}`);
    const data = await res.json();
    if (data.error){ st.textContent="Search error: "+data.error; return; }
    $("#countLabel").textContent = data.found ? `${data.found.toLocaleString()} result${data.found===1?"":"s"}` : "";
    if (!data.hits.length){ st.textContent="Nothing matches your filters yet."; return; }
    st.style.display="none";
    grid.innerHTML = data.hits.map(renderCard).join("");
    if (!facetsRendered && data.facets){ renderFacets(data.facets); facetsRendered=true; }
    const per=24;
    $("#prevBtn").disabled = state.page<=1;
    $("#nextBtn").disabled = state.page*per >= data.found;
  } catch(e){ st.style.display="block"; st.textContent="Could not reach search service."; }
}

function renderCard(d){
  const img=(d.image_url&&d.image_url[0])||(d.logo_url&&d.logo_url[0])||"";
  const url=d.event_ticket_url||d.document_url||"#";
  const loc=[d.location_city,d.location_state,d.location_country].filter(Boolean).join(", ");
  const kind=d.document_data_type||d.document_category||"";
  let dateStr="";
  if (d.event_date_start){
    try { dateStr=new Date(d.event_date_start*1000).toLocaleDateString(undefined,{month:"short",day:"numeric",year:"numeric"}); } catch(e){}
  }
  return `
    <a class="card" href="${esc(url)}" target="_blank" rel="noopener">
      <div class="thumb" ${img?`style="background-image:url('${esc(img)}')"`:""}>
        ${kind?`<span class="kind">${esc(kind)}</span>`:""}
        ${img?"":"No image"}
      </div>
      <div class="body">
        <div class="name">${esc(d.event_name||d.document_title||"Untitled")}</div>
        ${loc?`<div class="loc">${esc(loc)}</div>`:""}
        ${d.document_summary?`<div class="summary">${esc(d.document_summary)}</div>`:""}
        <div class="meta">
          ${dateStr?`<span>${dateStr}</span>`:""}
          ${d.event_free?`<span class="free-pill">Free</span>`:
            (d.event_ticket_price?`<span class="price-pill">$${Number(d.event_ticket_price).toFixed(2)}</span>`:"")}
        </div>
      </div>
    </a>`;
}

function renderFacets(f){
  fillList("#f-country", f.location_country, "country", 10);
  fillChips("#f-eventtype", f.event_type, "event_type");
  fillChips("#f-topics", f.topic_tags, "topic");
}
function fillList(sel, items, key, limit){
  if (!items) return;
  const el=$(sel);
  el.innerHTML = items.slice(0,limit||12).map(i=>`
    <label class="opt"><input type="radio" name="${key}" value="${esc(i.value)}"> ${esc(i.value)} <span class="count">${i.count}</span></label>`).join("");
  el.querySelectorAll("input").forEach(inp=>inp.addEventListener("change",()=>{ state[key]=inp.value; state.page=1; run(); }));
}
function fillChips(sel, items, key){
  if (!items) return;
  const el=$(sel);
  el.innerHTML = items.slice(0,14).map(i=>`<span class="chip" data-val="${esc(i.value)}">${esc(i.value)} <span class="count">${i.count}</span></span>`).join("");
  el.querySelectorAll(".chip").forEach(chip=>chip.addEventListener("click",()=>{
    const v=chip.dataset.val, active=state[key]===v;
    el.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));
    state[key]=active?"":v; if(!active) chip.classList.add("active");
    state.page=1; run();
  }));
}

// tabs
$("#tabs").querySelectorAll(".tab").forEach(tab=>tab.addEventListener("click",()=>{
  $("#tabs").querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  tab.classList.add("active");
  state.content_type=tab.dataset.ct; state.page=1; run();
}));

$("#searchBtn").addEventListener("click",()=>{ state.q=$("#q").value.trim(); state.page=1; run(); });
$("#q").addEventListener("keydown",e=>{ if(e.key==="Enter") $("#searchBtn").click(); });
$("#sort").addEventListener("change",e=>{ state.sort=e.target.value; state.page=1; run(); });
$("#country").addEventListener("change",e=>{ state.country=e.target.value.trim(); state.page=1; run(); });
$("#region").addEventListener("change",e=>{ state.region=e.target.value.trim(); state.page=1; run(); });
$("#city").addEventListener("change",e=>{ state.city=e.target.value.trim(); state.page=1; run(); });
$("#freeOnly").addEventListener("change",e=>{ state.free=e.target.checked; state.page=1; run(); });
document.querySelectorAll("[data-flag]").forEach(cb=>cb.addEventListener("change",()=>{ state.flags[cb.dataset.flag]=cb.checked; state.page=1; run(); }));

$("#prevBtn").addEventListener("click",()=>{ if(state.page>1){ state.page--; run(); window.scrollTo(0,0); } });
$("#nextBtn").addEventListener("click",()=>{ state.page++; run(); window.scrollTo(0,0); });

$("#clearBtn").addEventListener("click",()=>{
  Object.assign(state,{ q:"",page:1,sort:"relevance",content_type:"",country:"",region:"",city:"",
    event_type:"",topic:"",free:false,
    flags:{black_owned:false,women_owned:false,veteran_owned:false} });
  $("#q").value=""; $("#country").value=""; $("#region").value=""; $("#city").value="";
  document.querySelectorAll("input[type=checkbox]").forEach(c=>c.checked=false);
  document.querySelectorAll("input[type=radio]").forEach(c=>c.checked=false);
  document.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));
  $("#tabs").querySelectorAll(".tab").forEach((t,i)=>t.classList.toggle("active", i===0));
  run();
});

run();
</script>
</body>
</html>
