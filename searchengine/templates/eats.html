<!--
  Eats template — restaurants / services only.
  Talks to Django endpoint: searchengine:eats_search
  Restricted server-side to documents that have service_type set.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Eats</title>
<style>
  :root {
    --bg: #fbf7f2;
    --card: #ffffff;
    --ink: #1c1a17;
    --muted: #726c63;
    --line: #e8e2d8;
    --accent: #b5612b;        /* warm terracotta */
    --accent-soft: #f6ebe0;
    --chip: #f1eae0;
    --star: #c9892f;
    --radius: 14px;
    --shadow: 0 1px 2px rgba(0,0,0,.04), 0 8px 24px rgba(0,0,0,.05);
  }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--ink);
    font:15px/1.5 ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
  .wrap { max-width:1200px; margin:0 auto; padding:24px 20px 64px; }

  .searchbar { display:flex; gap:10px; align-items:center; background:var(--card);
    border:1px solid var(--line); border-radius:999px; padding:8px 8px 8px 18px;
    box-shadow:var(--shadow); max-width:720px; margin:0 auto 14px; }
  .searchbar svg { flex:none; color:var(--muted); }
  .searchbar input { border:0; outline:0; background:transparent; flex:1; font-size:16px; color:var(--ink); }
  .searchbar button { border:0; background:var(--accent); color:#fff; padding:10px 22px;
    border-radius:999px; font-size:15px; font-weight:600; cursor:pointer; }
  .searchbar button:hover { opacity:.92; }

  .locbar { display:flex; gap:10px; align-items:center; justify-content:center;
    max-width:720px; margin:0 auto 28px; }
  .locbar input { padding:9px 14px; border:1px solid var(--line); border-radius:999px;
    font-size:14px; width:220px; background:var(--card); }

  .layout { display:grid; grid-template-columns:248px 1fr; gap:28px; }
  @media (max-width:820px){ .layout{ grid-template-columns:1fr; } }

  .filters { align-self:start; position:sticky; top:20px; }
  .filter-group { border-bottom:1px solid var(--line); padding:14px 0; }
  .filter-group:first-child { padding-top:0; }
  .filter-group h4 { margin:0 0 10px; font-size:12px; letter-spacing:.06em;
    text-transform:uppercase; color:var(--muted); }
  .opt { display:flex; align-items:center; gap:8px; font-size:14px; padding:3px 0; cursor:pointer; }
  .opt input { accent-color:var(--accent); }
  .opt .count { margin-left:auto; color:var(--muted); font-size:12px; }
  .chips { display:flex; flex-wrap:wrap; gap:6px; }
  .chip { border:1px solid var(--line); background:var(--chip); border-radius:999px;
    padding:5px 12px; font-size:13px; cursor:pointer; }
  .chip.active { background:var(--accent); color:#fff; border-color:var(--accent); }
  .clear-btn { margin-top:14px; width:100%; padding:9px; border:1px solid var(--line);
    background:var(--card); border-radius:10px; cursor:pointer; font-size:14px; }

  .results-top { display:flex; align-items:center; justify-content:space-between;
    margin-bottom:16px; gap:12px; flex-wrap:wrap; }
  .results-top .count-label { color:var(--muted); font-size:14px; }
  .results-top select { padding:8px 12px; border:1px solid var(--line);
    border-radius:10px; background:var(--card); font-size:14px; }

  .grid { display:grid; gap:18px; grid-template-columns:repeat(auto-fill, minmax(240px,1fr)); }
  .card { background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    overflow:hidden; box-shadow:var(--shadow); display:flex; flex-direction:column;
    text-decoration:none; color:inherit; transition:transform .12s ease, box-shadow .12s ease; }
  .card:hover { transform:translateY(-2px); box-shadow:0 10px 30px rgba(0,0,0,.08); }
  .card .thumb { aspect-ratio:16/10; background:var(--accent-soft) center/cover no-repeat;
    display:flex; align-items:center; justify-content:center; color:var(--muted); }
  .card .body { padding:13px 14px 15px; display:flex; flex-direction:column; gap:5px; }
  .card .name { font-size:15px; font-weight:700; line-height:1.3; }
  .card .cuisine { font-size:12px; color:var(--muted); }
  .card .meta { display:flex; align-items:center; gap:8px; font-size:13px; color:var(--muted); flex-wrap:wrap; }
  .card .loc { font-size:12px; color:var(--muted); }
  .pricerange { font-weight:700; color:var(--accent); }
  .tags { display:flex; flex-wrap:wrap; gap:4px; margin-top:4px; }
  .tag { font-size:11px; padding:2px 8px; border-radius:999px; background:var(--accent-soft); color:var(--accent); font-weight:600; }
  .stars { color:var(--star); }

  .state { text-align:center; padding:60px 20px; color:var(--muted); }
  .pager { display:flex; justify-content:center; gap:10px; margin-top:30px; }
  .pager button { padding:9px 18px; border:1px solid var(--line); background:var(--card);
    border-radius:10px; cursor:pointer; font-size:14px; }
  .pager button:disabled { opacity:.4; cursor:default; }
</style>
</head>
<body>
<div class="wrap">

  <!-- SEARCH BAR -->
  <div class="searchbar">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
    </svg>
    <input id="q" type="text" placeholder="Search restaurants, cuisines, dishes…" autocomplete="off">
    <button id="searchBtn">Search</button>
  </div>

  <!-- LOCATION FILTER -->
  <div class="locbar">
    <input id="city" type="text" placeholder="City">
    <input id="stateF" type="text" placeholder="State">
  </div>

  <div class="layout">

    <!-- FILTERS -->
    <aside class="filters">
      <div class="filter-group">
        <h4>Cuisine / Type</h4>
        <div class="chips" id="f-type"></div>
      </div>

      <div class="filter-group">
        <h4>Price</h4>
        <div class="chips" id="f-price">
          <span class="chip" data-price="$">$</span>
          <span class="chip" data-price="$$">$$</span>
          <span class="chip" data-price="$$$">$$$</span>
          <span class="chip" data-price="$$$$">$$$$</span>
        </div>
      </div>

      <div class="filter-group">
        <h4>Rating</h4>
        <div class="chips" id="f-rating">
          <span class="chip" data-rating="4">4★ & up</span>
          <span class="chip" data-rating="3">3★ & up</span>
        </div>
      </div>

      <div class="filter-group">
        <h4>Specialties</h4>
        <div class="chips" id="f-specialty"></div>
      </div>

      <div class="filter-group">
        <h4>Options</h4>
        <label class="opt"><input type="checkbox" id="delivery"> Delivery</label>
        <label class="opt"><input type="checkbox" id="reservations"> Takes reservations</label>
      </div>

      <div class="filter-group">
        <h4>Ownership</h4>
        <label class="opt"><input type="checkbox" data-flag="black_owned"> Black-owned</label>
        <label class="opt"><input type="checkbox" data-flag="women_owned"> Women-owned</label>
        <label class="opt"><input type="checkbox" data-flag="veteran_owned"> Veteran-owned</label>
        <label class="opt"><input type="checkbox" data-flag="minority_owned"> Minority-owned</label>
      </div>

      <button class="clear-btn" id="clearBtn">Clear all filters</button>
    </aside>

    <!-- RESULTS -->
    <main>
      <div class="results-top">
        <span class="count-label" id="countLabel">—</span>
        <select id="sort">
          <option value="relevance">Most relevant</option>
          <option value="rating">Top rated</option>
          <option value="reviews">Most reviewed</option>
        </select>
      </div>
      <div class="grid" id="grid"></div>
      <div class="state" id="state" style="display:none;"></div>
      <div class="pager">
        <button id="prevBtn" disabled>← Prev</button>
        <button id="nextBtn" disabled>Next →</button>
      </div>
    </main>
  </div>
</div>

<script>
const SEARCH_URL = "{% url 'searchengine:eats_search' %}";

const state = {
  q:"", page:1, sort:"relevance",
  city:"", stateF:"", type:"", specialty:"", price:"", min_rating:"",
  delivery:false, reservations:false,
  flags:{ black_owned:false, women_owned:false, veteran_owned:false, minority_owned:false },
};
let facetsRendered = false;

const $ = s => document.querySelector(s);
const esc = s => String(s ?? "").replace(/[&<>"]/g, c=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c]));
const starsHtml = r => r ? `<span class="stars">${"★".repeat(Math.round(r))}${"☆".repeat(5-Math.round(r))}</span>` : "";

function buildParams() {
  const p = new URLSearchParams();
  if (state.q) p.set("q", state.q);
  p.set("page", state.page); p.set("sort", state.sort);
  for (const k of ["city","stateF","type","specialty","price","min_rating"]) {
    if (state[k]) p.set(k === "stateF" ? "state" : k, state[k]);
  }
  if (state.delivery) p.set("delivery","true");
  if (state.reservations) p.set("reservations","true");
  for (const f in state.flags) if (state.flags[f]) p.set(f,"true");
  return p;
}

async function run() {
  const grid=$("#grid"), st=$("#state");
  st.style.display="block"; st.textContent="Loading…"; grid.innerHTML="";
  try {
    const res = await fetch(`${SEARCH_URL}?${buildParams()}`);
    const data = await res.json();
    if (data.error){ st.textContent="Search error: "+data.error; return; }
    $("#countLabel").textContent = data.found ? `${data.found.toLocaleString()} place${data.found===1?"":"s"}` : "";
    if (!data.hits.length){ st.textContent="No restaurants match your filters."; return; }
    st.style.display="none";
    grid.innerHTML = data.hits.map(renderCard).join("");
    if (!facetsRendered && data.facets){ renderFacets(data.facets); facetsRendered=true; }
    const per=24;
    $("#prevBtn").disabled = state.page<=1;
    $("#nextBtn").disabled = state.page*per >= data.found;
  } catch(e){ st.style.display="block"; st.textContent="Could not reach search service."; }
}

function renderCard(d){
  const img=(d.image_url&&d.image_url[0])||"";
  const url=d.service_website||d.document_url||"#";
  const types=[].concat(d.service_type||[]);
  const tags=[];
  if (d.black_owned) tags.push("Black-owned");
  if (d.women_owned) tags.push("Women-owned");
  if (d.service_delivery) tags.push("Delivery");
  const loc=[d.location_city,d.location_state].filter(Boolean).join(", ");
  return `
    <a class="card" href="${esc(url)}" target="_blank" rel="noopener">
      <div class="thumb" ${img?`style="background-image:url('${esc(img)}')"`:""}>${img?"":"No image"}</div>
      <div class="body">
        <div class="name">${esc(d.document_title||types[0]||"Restaurant")}</div>
        ${types.length?`<div class="cuisine">${esc(types.join(" · "))}</div>`:""}
        <div class="meta">
          ${starsHtml(d.service_rating)}
          ${d.service_review_count?`<span>(${d.service_review_count})</span>`:""}
          ${d.service_price_range?`<span class="pricerange">${esc(d.service_price_range)}</span>`:""}
        </div>
        ${loc?`<div class="loc">${esc(loc)}</div>`:""}
        ${tags.length?`<div class="tags">${tags.map(t=>`<span class="tag">${t}</span>`).join("")}</div>`:""}
      </div>
    </a>`;
}

function renderFacets(f){
  fillChips("#f-type", f.service_type, "type");
  fillChips("#f-specialty", f.service_specialties, "specialty");
}
function fillChips(sel, items, key){
  if (!items) return;
  const el=$(sel);
  el.innerHTML = items.slice(0,14).map(i=>`<span class="chip" data-val="${esc(i.value)}">${esc(i.value)} <span class="count">${i.count}</span></span>`).join("");
  el.querySelectorAll(".chip").forEach(chip=>chip.addEventListener("click",()=>{
    const v=chip.dataset.val, active=state[key]===v;
    el.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));
    state[key]=active?"":v; if(!active) chip.classList.add("active");
    state.page=1; run();
  }));
}

$("#searchBtn").addEventListener("click",()=>{ state.q=$("#q").value.trim(); state.page=1; run(); });
$("#q").addEventListener("keydown",e=>{ if(e.key==="Enter") $("#searchBtn").click(); });
$("#sort").addEventListener("change",e=>{ state.sort=e.target.value; state.page=1; run(); });
$("#city").addEventListener("change",e=>{ state.city=e.target.value.trim(); state.page=1; run(); });
$("#stateF").addEventListener("change",e=>{ state.stateF=e.target.value.trim(); state.page=1; run(); });

function chipGroup(sel, key, dataAttr){
  $(sel).querySelectorAll(".chip").forEach(chip=>chip.addEventListener("click",()=>{
    const v=chip.dataset[dataAttr], active=state[key]===v;
    $(sel).querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));
    state[key]=active?"":v; if(!active) chip.classList.add("active");
    state.page=1; run();
  }));
}
chipGroup("#f-price","price","price");
chipGroup("#f-rating","min_rating","rating");

$("#delivery").addEventListener("change",e=>{ state.delivery=e.target.checked; state.page=1; run(); });
$("#reservations").addEventListener("change",e=>{ state.reservations=e.target.checked; state.page=1; run(); });
document.querySelectorAll("[data-flag]").forEach(cb=>cb.addEventListener("change",()=>{ state.flags[cb.dataset.flag]=cb.checked; state.page=1; run(); }));

$("#prevBtn").addEventListener("click",()=>{ if(state.page>1){ state.page--; run(); window.scrollTo(0,0); } });
$("#nextBtn").addEventListener("click",()=>{ state.page++; run(); window.scrollTo(0,0); });

$("#clearBtn").addEventListener("click",()=>{
  Object.assign(state,{ q:"",page:1,sort:"relevance",city:"",stateF:"",type:"",specialty:"",price:"",min_rating:"",
    delivery:false,reservations:false,
    flags:{black_owned:false,women_owned:false,veteran_owned:false,minority_owned:false} });
  $("#q").value=""; $("#city").value=""; $("#stateF").value="";
  document.querySelectorAll("input[type=checkbox]").forEach(c=>c.checked=false);
  document.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));
  run();
});

run();
</script>
</body>
</html>
