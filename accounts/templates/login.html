<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AfroTodo</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --black: #1a1a1a;
            --green: #2d6a4f;
            --green-light: #40916c;
            --gold: #d4a03a;
            --gold-light: #e9c46a;
            --red: #bc4749;
            --red-deep: #9b2226;
            --cream: #faf8f5;
            --warm-white: #fffef9;
            --gray-100: #f5f3f0;
            --gray-200: #e8e4df;
            --gray-300: #d4cfc8;
            --gray-500: #8a8279;
            --gray-700: #4a4640;
            
            --font-display: 'Playfair Display', Georgia, serif;
            --font-body: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            
            --space-xs: 4px;
            --space-sm: 8px;
            --space-md: 16px;
            --space-lg: 24px;
            --space-xl: 32px;
            --space-2xl: 48px;
            
            --transition-fast: 150ms ease;
            --transition-base: 250ms ease;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--cream);
            color: var(--black);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            line-height: 1.6;
        }

        /* Subtle background texture */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 80%, rgba(45, 106, 79, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(212, 160, 58, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* Header */
        .header {
            padding: var(--space-md) var(--space-lg);
            background: rgba(250, 248, 245, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--gray-200);
            position: relative;
            z-index: 10;
        }

        .header-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: var(--font-display);
            font-size: 24px;
            font-weight: 700;
        }

        .logo .letter-a { color: var(--black); }
        .logo .letter-f { color: var(--green); }
        .logo .letter-r { color: var(--gold); }
        .logo .letter-o { color: var(--red); }
        .logo .letter-text { color: var(--black); }

        .header-link {
            font-size: 14px;
            font-weight: 500;
            color: var(--gray-700);
            padding: var(--space-sm) var(--space-md);
            border-radius: 8px;
            transition: all var(--transition-fast);
        }

        .header-link:hover {
            background: var(--gray-100);
            color: var(--black);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-xl) var(--space-md);
            position: relative;
            z-index: 1;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
        }

        /* Login Card */
        .login-card {
            background: var(--warm-white);
            border: 1px solid var(--gray-200);
            border-radius: 16px;
            padding: var(--space-2xl);
            box-shadow: 
                0 4px 6px -1px rgba(0, 0, 0, 0.05),
                0 10px 20px -5px rgba(0, 0, 0, 0.05);
        }

        .login-header {
            text-align: center;
            margin-bottom: var(--space-xl);
        }

        .login-logo {
            font-family: var(--font-display);
            font-size: 36px;
            font-weight: 800;
            margin-bottom: var(--space-sm);
        }

        .login-logo .letter-a { color: var(--black); }
        .login-logo .letter-f { color: var(--green); }
        .login-logo .letter-r { color: var(--gold); }
        .login-logo .letter-o { color: var(--red); }
        .login-logo .letter-text { color: var(--black); }

        .login-title {
            font-family: var(--font-display);
            font-size: 24px;
            font-weight: 700;
            color: var(--black);
            margin-bottom: var(--space-xs);
        }

        .login-subtitle {
            font-size: 15px;
            color: var(--gray-500);
        }

        /* Form */
        .form-group {
            margin-bottom: var(--space-lg);
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--gray-700);
            margin-bottom: var(--space-sm);
        }

        .form-input {
            width: 100%;
            padding: var(--space-md);
            font-family: var(--font-body);
            font-size: 16px;
            color: var(--black);
            background: var(--cream);
            border: 2px solid var(--gray-200);
            border-radius: 10px;
            outline: none;
            transition: all var(--transition-base);
        }

        .form-input::placeholder {
            color: var(--gray-500);
        }

        .form-input:focus {
            border-color: var(--green);
            background: var(--warm-white);
            box-shadow: 0 0 0 3px rgba(45, 106, 79, 0.1);
        }

        .forgot-link {
            display: block;
            text-align: right;
            font-size: 13px;
            color: var(--green);
            font-weight: 500;
            margin-top: var(--space-sm);
            transition: color var(--transition-fast);
        }

        .forgot-link:hover {
            color: var(--green-light);
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: var(--space-md) var(--space-lg);
            font-family: var(--font-body);
            font-size: 16px;
            font-weight: 600;
            color: var(--warm-white);
            background: var(--black);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all var(--transition-fast);
            margin-top: var(--space-md);
        }

        .submit-btn:hover {
            background: var(--gray-700);
            transform: translateY(-1px);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            margin: var(--space-lg) 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--gray-200);
        }

        .divider span {
            padding: 0 var(--space-md);
            font-size: 13px;
            color: var(--gray-500);
        }

        /* Social Login */
        .social-btn {
            width: 100%;
            padding: var(--space-md);
            font-family: var(--font-body);
            font-size: 15px;
            font-weight: 500;
            color: var(--gray-700);
            background: var(--warm-white);
            border: 2px solid var(--gray-200);
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-sm);
            transition: all var(--transition-fast);
            margin-bottom: var(--space-sm);
        }

        .social-btn:hover {
            border-color: var(--gray-300);
            background: var(--gray-100);
        }

        .social-btn svg {
            width: 20px;
            height: 20px;
        }

        /* Sign Up Link */
        .signup-prompt {
            text-align: center;
            margin-top: var(--space-lg);
            font-size: 15px;
            color: var(--gray-500);
        }

        .signup-link {
            color: var(--green);
            font-weight: 600;
            transition: color var(--transition-fast);
        }

        .signup-link:hover {
            color: var(--green-light);
        }

        /* Messages */
        .messages {
            margin-bottom: var(--space-md);
        }

        .message {
            padding: var(--space-md);
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: var(--space-sm);
        }

        .message.error {
            background: rgba(188, 71, 73, 0.1);
            color: var(--red);
            border: 1px solid rgba(188, 71, 73, 0.2);
        }

        .message.success {
            background: rgba(45, 106, 79, 0.1);
            color: var(--green);
            border: 1px solid rgba(45, 106, 79, 0.2);
        }

        /* Footer */
        .footer {
            padding: var(--space-lg);
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .footer-text {
            font-size: 13px;
            color: var(--gray-500);
        }

        .footer-link {
            color: var(--gray-500);
            transition: color var(--transition-fast);
        }

        .footer-link:hover {
            color: var(--black);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-card {
                padding: var(--space-xl) var(--space-lg);
            }

            .login-logo {
                font-size: 30px;
            }

            .login-title {
                font-size: 20px;
            }

            .form-input {
                font-size: 16px; /* Prevents zoom on iOS */
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-inner">
            <a href="/" class="logo">
                <span class="letter-a">A</span><span class="letter-f">f</span><span class="letter-r">r</span><span class="letter-o">o</span><span class="letter-text">Todo</span>
            </a>
            <a href="{% url 'accounts:register' %}" class="header-link">Sign Up</a>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="login-container">
            <div class="login-card">
                <div class="login-header">
                    <div class="login-logo">
                        <span class="letter-a">A</span><span class="letter-f">f</span><span class="letter-r">r</span><span class="letter-o">o</span><span class="letter-text">Todo</span>
                    </div>
                    <h1 class="login-title">Welcome back</h1>
                    <p class="login-subtitle">Sign in to continue to your account</p>
                </div>

                <!-- Django Messages -->
                {% if messages %}
                <div class="messages">
                    {% for message in messages %}
                    <div class="message {{ message.tags }}">{{ message }}</div>
                    {% endfor %}
                </div>
                {% endif %}

                <form method="post" action="{% url 'accounts:login' %}" novalidate>
                    {% csrf_token %}
                    
                    <div class="form-group">
                        <label for="email" class="form-label">Email</label>
                        <input 
                            type="email" 
                            id="email"
                            name="email" 
                            class="form-input"
                            placeholder="Enter your email"
                            required
                            autocomplete="email"
                        >
                    </div>

                    <div class="form-group">
                        <label for="password" class="form-label">Password</label>
                        <input 
                            type="password" 
                            id="password"
                            name="password" 
                            class="form-input"
                            placeholder="Enter your password"
                            required
                            autocomplete="current-password"
                        >
                        <a href="#" class="forgot-link">Forgot password?</a>
                    </div>

                    <button type="submit" class="submit-btn">Sign In</button>
                </form>

                <div class="divider">
                    <span>or continue with</span>
                </div>

                <button type="button" class="social-btn">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    Continue with Google
                </button>

                <p class="signup-prompt">
                    Don't have an account? <a href="{% url 'accounts:register' %}" class="signup-link">Sign up</a>
                </p>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p class="footer-text">
            <a href="#" class="footer-link">Privacy</a> · <a href="#" class="footer-link">Terms</a> · © 2025 AfroTodo
        </p>
    </footer>
</body>
</html>
